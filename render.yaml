services:
  - type: web
    name: sales-forecasting-api
    env: python
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0